<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>林氏忠孝堂族譜</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="toolbar">
      <div class="title-wrap">
        <h1>林氏忠孝堂族譜</h1>
        <span id="versionBadge" class="version-badge">版本 --</span>
      </div>
      <div class="actions">
        <button id="zoomOutBtn" type="button">縮小</button>
        <button id="zoomInBtn" type="button">放大</button>
        <button id="resetBtn" type="button">重置視圖</button>
      </div>
    </header>

    <main class="graph-wrap">
      <section id="graphStage" class="graph-stage" aria-label="林氏忠孝堂族譜圖">
        <div id="graphCanvas" role="img" aria-label="林氏忠孝堂族譜 Graph"></div>
      </section>

      <aside class="panel">
        <h2>族譜操作</h2>
        <ul>
          <li>預設為家系模式：上下各顯示 3 代</li>
          <li>點擊節點：以該人為中心重排（樹狀）</li>
          <li>旁系預設收合，可手動展開</li>
          <li>拖曳空白處平移，滾輪或雙指縮放</li>
          <li>可切換全圖模式做整體探索</li>
        </ul>
        <p id="focusInfo">目前：顯示全部族譜</p>

        <section class="mode-block" aria-labelledby="modeTitle">
          <h3 id="modeTitle">顯示模式</h3>
          <div class="mode-switch">
            <button id="familyModeBtn" class="mode-btn is-active" type="button">家系模式</button>
            <button id="fullModeBtn" class="mode-btn" type="button">全圖模式</button>
          </div>
          <label class="side-branch-toggle" for="sideBranchToggle">
            <input id="sideBranchToggle" type="checkbox" />
            展開旁系分支
          </label>
          <label class="full-collapse-toggle" for="fullCollapseToggle">
            <input id="fullCollapseToggle" type="checkbox" checked />
            全圖模式折疊末梢節點
          </label>
          <label class="zoom-toggle" for="autoZoomToggle">
            <input id="autoZoomToggle" type="checkbox" checked />
            自動置中與 ZOOM IN
          </label>
        </section>

        <section class="search-block" aria-labelledby="searchTitle">
          <h3 id="searchTitle">關鍵字檢索</h3>
          <input id="searchInput" type="text" placeholder="輸入姓名關鍵字" autocomplete="off" />
          <div id="searchResults" class="search-results" role="listbox" aria-label="姓名檢索結果"></div>
        </section>

        <p class="hint">註：此圖依你提供的表格整理，若要補配偶、字輩註記或修正人名，我可以再幫你更新。</p>
      </aside>
    </main>

    <script src="./familyData.js"></script>
    <script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
